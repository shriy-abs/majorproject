<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Cognitive Form Assist</title>
  <link rel="stylesheet" href="popup.css" />
</head>
<body class="popup-simple">
  <header class="dash-header">
    <div class="dash-brand">
      <span class="dash-logo" aria-hidden="true">◉</span>
      <div>
        <h1>Cognitive Form Assist</h1>
        <p class="dash-subtitle">Form help on any webpage</p>
      </div>
    </div>
  </header>

  <main class="popup-main">
    <section class="popup-section">
      <label class="lang-select-wrap" for="voiceLanguage">
        <span class="lang-select-label">Language</span>
        <select id="voiceLanguage" class="lang-select" aria-label="Help and voice language">
          <option value="EN">English (EN)</option>
          <option value="HI">Hindi (HI)</option>
          <option value="KN">Kannada (KN)</option>
        </select>
      </label>
      <p class="popup-hint">Field explanations, validation hints, and voice use the language you pick.</p>
    </section>

    <section class="popup-section popup-section--dashboard">
      <h2>Analytics</h2>
      <p class="popup-hint">Charts and session stats live in a separate dashboard (not in this popup).</p>
      <a id="openDashboard" href="#" class="popup-dashboard-link" target="_blank" rel="noopener">
        Open Analytics Dashboard →
      </a>
    </section>
  </main>

  <footer class="dash-footer">
    <a href="options.html" target="_blank" rel="noopener">Settings</a>
  </footer>

  <script src="popup.js"></script>
</body>
</html>
