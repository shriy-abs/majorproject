<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Cognitive Form Assist — Settings</title>
  <style>
    body { font-family: system-ui, sans-serif; max-width: 520px; margin: 24px; }
    label { display: block; font-weight: 600; margin-bottom: 6px; }
    input { width: 100%; padding: 8px; box-sizing: border-box; }
    button { margin-top: 12px; padding: 8px 16px; cursor: pointer; }
    p.hint { color: #444; font-size: 14px; }
    #status { margin-top: 10px; font-size: 14px; }
  </style>
</head>
<body>
  <h1>Cognitive Form Assist</h1>
  <p class="hint">Backend URL must match where you run <code>python app.py</code> (default below).</p>
  <label for="backendUrl">Backend base URL</label>
  <input type="url" id="backendUrl" placeholder="http://127.0.0.1:5000" />
  <div>
    <button type="button" id="save">Save</button>
  </div>
  <p id="status"></p>
  <p class="hint"><a id="dashboardLink" href="http://127.0.0.1:5000/dashboard" target="_blank" rel="noopener">Open Analytics Dashboard</a> (separate from the extension popup)</p>
  <script src="options.js"></script>
</body>
</html>
